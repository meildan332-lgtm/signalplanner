<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="https://i.postimg.cc/wjrJrQ0c/A1EAA0.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/wjrJrQ0c/A1EAA0.png">
    <link rel="shortcut icon" href="https://i.postimg.cc/wjrJrQ0c/A1EAA0.png">
    
    <link rel="manifest" href="manifest.json">
    
    <meta property="og:title" content="SIGNAL">
    <meta property="og:description" content="시그널 멤버 일정">
    <meta property="og:image" content="https://i.postimg.cc/wjrJrQ0c/A1EAA0.png">

    <title>시그널 일정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css'>
    <link rel="stylesheet" href="style.css">
    
    <script type="text/javascript" src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
</head>
<body class="bg-[#ffdddd] lg:pt-24 pt-[70px] lg:pb-0 pb-[80px] overflow-x-hidden lg:overflow-x-auto min-w-[320px] lg:min-w-[max-content]">

    <header class="fixed top-0 left-0 w-full h-[70px] bg-white shadow-md z-[1000] hidden lg:flex items-center min-w-[1850px]">
        <div class="flex justify-between items-center w-[1795px] mx-auto px-4">
            <div id="headerNavTabs" class="flex gap-2"></div>
            <div class="flex items-center gap-3">
                <a href="https://cafe.naver.com/restormy" target="_blank" class="w-[42px] h-[42px] bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition-all flex items-center justify-center shadow-sm" title="팬카페">
                    <img src="https://i.namu.wiki/i/60iH01FCsv0tbwsiq7MUKE7sTT86TepZ-sn_8sOA_sHh5JNB6EvhVtNq8-misr5taGP4KeeGC7VxNEPR3oX1R9iBeEtC2ltACXR_GVfzayfSRmHmDUFaJDAcHJRtuB5ZQeC3Wum5vQXPNQcDe8QjCA.webp" class="w-[22px] h-[22px] object-contain">
                </a>
                <a href="https://www.youtube.com/@SIGNAL_SOOP" target="_blank" class="w-[42px] h-[42px] bg-[#FF0000] text-white rounded-xl hover:brightness-110 transition-all flex items-center justify-center shadow-sm text-xl" title="유튜브">
                    <i class="fi fi-brands-youtube mt-1"></i>
                </a>
                <div id="desktopAuthContainer" class="ml-1 relative">
                    <button class="font-paperozi bg-white border-2 border-gray-200 px-4 py-2 rounded-xl font-bold text-lg text-[#5D4037] hover:bg-[#5D4037] hover:border-[#5D4037] hover:text-white transition-all duration-200 shadow-sm" onclick="handleAdminClick()">로그인</button>
                </div>
            </div>
        </div>
    </header>

    <header class="fixed top-0 left-0 w-full h-[60px] bg-white shadow-sm z-[1000] flex lg:hidden justify-between items-center px-3">
        <div class="flex items-center shrink-0">
            <img src="https://i.postimg.cc/wjrJrQ0c/A1EAA0.png" class="h-[30px] cursor-pointer" onclick="executeMobileTabChange('홈')">
        </div>
        <div class="flex items-center gap-1.5 shrink-0">
            <a href="https://cafe.naver.com/restormy" target="_blank" class="w-[32px] h-[32px] bg-white border border-gray-200 rounded-lg flex items-center justify-center shadow-sm">
                <img src="https://i.namu.wiki/i/60iH01FCsv0tbwsiq7MUKE7sTT86TepZ-sn_8sOA_sHh5JNB6EvhVtNq8-misr5taGP4KeeGC7VxNEPR3oX1R9iBeEtC2ltACXR_GVfzayfSRmHmDUFaJDAcHJRtuB5ZQeC3Wum5vQXPNQcDe8QjCA.webp" class="w-[18px] h-[18px] object-contain">
            </a>
            <a href="https://www.youtube.com/@SIGNAL_SOOP" target="_blank" class="w-[32px] h-[32px] bg-[#FF0000] text-white rounded-lg flex items-center justify-center shadow-sm text-lg">
                <i class="fi fi-brands-youtube mt-0.5"></i>
            </a>
            <div id="mobileAuthContainer" class="shrink-0 relative">
                <button class="font-paperozi bg-white border border-gray-200 px-2 py-[5px] rounded-lg font-bold text-[13px] text-[#5D4037] hover:bg-[#5D4037] hover:text-white transition-all shadow-sm" onclick="handleAdminClick()">로그인</button>
            </div>
            <div id="mobileHeaderRightBtn" class="shrink-0"></div>
        </div>
    </header>

    <nav id="mobileBottomNav" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-[2000] flex lg:hidden justify-around items-center h-[70px] pb-2 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]"></nav>

    <div id="mobileTabMenuOverlay" class="fixed inset-0 bg-transparent z-[2500] hidden pointer-events-auto" onclick="closeMobileTabMenu()">
        <div id="mobileTabMenuContainer" class="absolute bottom-[80px] right-4 bg-[#FFFDF5] w-48 rounded-2xl p-4 shadow-[3px_3px_0px_0px_rgba(0,0,0,0.3)] border-[1.5px] border-[#5D4037] transition-all duration-200 opacity-0 translate-y-4" onclick="event.stopPropagation()">
        </div>
    </div>

    <div class="planner-container relative w-full lg:max-w-[2400px] mx-auto flex flex-col lg:flex-row justify-center items-start lg:gap-6 lg:px-10 px-0 transition-all duration-300">
        <div id="mainContent" class="shrink-0 transition-all duration-300 w-full lg:w-auto"></div>
        
        <div id="sideWrapper" class="shrink-0 lg:relative w-0 lg:w-[420px] h-0 lg:h-[1000px] lg:mt-[10px]">
            <div id="sideBtnContainer" class="absolute top-[55px] left-0 z-20 hidden lg:flex justify-start items-center w-full">
                <div id="dynamicSideBtn"></div>
            </div>

            <div id="sideExpansionPanel" class="fixed bottom-0 left-0 w-full z-[4000] lg:absolute lg:top-[115px] lg:right-0 lg:bottom-auto lg:w-[420px] lg:z-auto hidden flex-col opacity-0 lg:opacity-100 bg-[#FFFDF5] rounded-t-[26px] lg:rounded-[26px] shadow-[0_-5px_30px_rgba(0,0,0,0.2)] lg:shadow-[0_11px_33px_rgba(0,0,0,0.15)] overflow-hidden transition-all duration-300 transform translate-y-full lg:translate-y-0 h-[85vh] lg:h-[890px] lg:origin-top">
            </div>
        </div>
    </div>

    <div id="mobilePanelOverlay" class="fixed inset-0 bg-black/60 z-[3900] hidden lg:hidden" onclick="closeSidePanel()"></div>

    <div id="linkModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]">
        <div class="modal-content bg-[#FFFDF5] p-8 rounded-2xl w-[600px] shadow-xl border-4 border-[#5D4037] flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-[#5D4037] font-paperozi">링크 관리</h2>
                <button onclick="closeLinkModal()" class="text-3xl text-[#5D4037] hover:text-red-500 transition cursor-pointer"><i class="fi fi-br-cross-small"></i></button>
            </div>
            <div class="overflow-y-auto pr-2 modal-scroll flex-1">
                <h3 class="text-lg font-bold text-[#5D4037] mb-3 border-b-2 border-dashed border-gray-300 pb-2">기존 메뉴 링크</h3>
                <div id="memberLinksContainer" class="flex flex-col gap-2 mb-4"></div>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="newLinkTitle" placeholder="이름(예: 인스타)" class="flex-1 border-2 border-[#5D4037] rounded-lg p-2 text-sm outline-none focus:border-blue-400">
                    <input type="text" id="newLinkUrl" placeholder="URL 입력" class="flex-[2] border-2 border-[#5D4037] rounded-lg p-2 text-sm outline-none focus:border-blue-400">
                    <button onclick="addMemberLink()" class="bg-[#5D4037] text-white px-4 rounded-lg font-bold hover:brightness-110 shrink-0">추가</button>
                </div>
                <div class="w-full border-b-4 border-dashed border-[#5D4037] opacity-50 my-6"></div>
                <h3 class="text-lg font-bold text-[#5D4037] mb-3 border-b-2 border-dashed border-gray-300 pb-2">UP 링크 등록</h3>
                <div class="flex flex-col gap-3 mb-2 bg-white p-4 rounded-xl border-2 border-gray-200">
                    <input type="text" id="upTitle" placeholder="컨텐츠 제목" class="border-2 border-[#5D4037] rounded-lg p-2 text-sm outline-none focus:border-blue-400">
                    <input type="text" id="upUrl" placeholder="새탭으로 열릴 URL (https://...)" class="border-2 border-[#5D4037] rounded-lg p-2 text-sm outline-none focus:border-blue-400">
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-bold text-gray-600 shrink-0">마감일자(선택):</span>
                        <input type="date" id="upDeadline" class="border-2 border-[#5D4037] rounded-lg p-2 text-sm outline-none flex-1">
                    </div>
                    <button onclick="addUpLink()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mt-2 hover:bg-blue-700 transition">업링크 추가</button>
                </div>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]">
        <div class="modal-content bg-white p-6 rounded-xl w-80 shadow-xl border-4 border-[#5D4037]">
            <h2 class="text-xl font-bold mb-4 text-center text-[#5D4037]">관리자 인증</h2>
            <div id="naverIdLogin" class="flex justify-center mb-4"></div>
            <div class="relative flex py-3 items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm font-bold">또는 비밀번호</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>
            <input type="password" id="pwInput" class="w-full border-2 border-[#5D4037] rounded p-2 mb-4 text-center text-lg tracking-widest mt-2" placeholder="비밀번호 입력" onkeypress="if(event.key==='Enter') checkPassword()">
            <div class="flex gap-2">
                <button class="flex-1 bg-gray-200 text-gray-700 py-2 rounded font-bold hover:bg-gray-300 transition cursor-pointer" onclick="closePasswordModal()">취소</button>
                <button class="flex-1 bg-[#5D4037] text-white py-2 rounded font-bold hover:brightness-110 transition cursor-pointer" onclick="checkPassword()">확인</button>
            </div>
        </div>
    </div>

    <div id="logoutModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]">
        <div class="modal-content bg-white p-6 rounded-xl w-80 shadow-xl border-4 border-[#5D4037]">
            <h2 class="text-xl font-bold mb-4 text-center text-[#5D4037]">로그아웃 하시겠습니까?</h2>
            <div class="flex gap-2 mt-6">
                <button class="flex-1 bg-gray-200 text-gray-700 py-2 rounded font-bold hover:bg-gray-300 transition cursor-pointer" onclick="closeLogoutModal()">취소</button>
                <button class="flex-1 bg-red-500 text-white py-2 rounded font-bold hover:bg-red-600 transition cursor-pointer" onclick="logoutAdmin()">로그아웃</button>
            </div>
        </div>
    </div>

    <div id="scheduleModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]">
        <div class="modal-content bg-[#FFFDF5] p-6 rounded-2xl w-[90%] max-w-[500px] shadow-xl max-h-[90vh] flex flex-col relative border-4 border-[#5D4037]">
            <button class="absolute top-4 right-4 text-2xl text-[#5D4037] hover:scale-110 transition cursor-pointer" onclick="closeScheduleModal()"><i class="fi fi-br-cross"></i></button>
            <div class="text-2xl font-bold text-center text-[#5D4037] mb-6" id="scheduleModalDate"></div>
            <div class="flex gap-4 mb-4">
                <div class="flex-1"><input type="radio" id="typeBangon" name="globalSchType" value="뱅온" class="type-radio" checked onchange="toggleFields('scheduleModal', 'globalSchType')"><label for="typeBangon" class="type-label bangon">뱅온</label></div>
                <div class="flex-1"><input type="radio" id="typeHubang" name="globalSchType" value="휴방" class="type-radio" onchange="toggleFields('scheduleModal', 'globalSchType')"><label for="typeHubang" class="type-label hubang">휴방</label></div>
            </div>
            <div id="scheduleInputsContainer" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3 modal-scroll mb-4"></div>
            <button class="w-full py-3 border-2 border-dashed border-[#5D4037] text-[#5D4037] font-bold rounded-xl hover:bg-[#5D4037] hover:text-white transition mb-4 cursor-pointer" onclick="addScheduleInputBlock()">+ 일정 추가</button>
            <button class="w-full bg-[#5D4037] text-white py-4 rounded-xl font-bold text-xl hover:brightness-110 transition shadow-md cursor-pointer" onclick="saveSchedule()">저장하기</button>
        </div>
    </div>

    <div id="editScheduleModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]">
        <div class="modal-content bg-[#FFFDF5] p-6 rounded-2xl w-[90%] max-w-[500px] shadow-xl relative border-4 border-[#5D4037]">
            <button class="absolute top-4 right-4 text-2xl text-[#5D4037] hover:scale-110 transition cursor-pointer" onclick="closeEditModal()"><i class="fi fi-br-cross"></i></button>
            <div class="text-2xl font-bold text-center text-[#5D4037] mb-6">일정 수정</div>
            <div class="flex gap-4 mb-4">
                <div class="flex-1"><input type="radio" id="editTypeBangon" name="editGlobalSchType" value="뱅온" class="type-radio" checked onchange="toggleFields('editScheduleModal', 'editGlobalSchType')"><label for="editTypeBangon" class="type-label bangon">뱅온</label></div>
                <div class="flex-1"><input type="radio" id="editTypeHubang" name="editGlobalSchType" value="휴방" class="type-radio" onchange="toggleFields('editScheduleModal', 'editGlobalSchType')"><label for="editTypeHubang" class="type-label hubang">휴방</label></div>
            </div>
            <div id="editContainer" class="mb-4"></div>
            <button class="w-full bg-[#5D4037] text-white py-4 rounded-xl font-bold text-xl hover:brightness-110 transition shadow-md cursor-pointer" onclick="saveEditedSchedule()">수정 완료</button>
        </div>
    </div>

    <div id="scheduleDetailModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]" onclick="closeDetailModal()">
        <div class="modal-content bg-[#FFFDF5] p-8 rounded-3xl w-[90%] max-w-[400px] shadow-2xl relative border-4 border-[#5D4037] flex flex-col items-center" onclick="event.stopPropagation()">
            <div class="w-full flex justify-end mb-2"><button class="text-3xl text-[#5D4037] hover:scale-110 transition modal-arrow-btn cursor-pointer" onclick="closeDetailModal()"><i class="fi fi-rr-cross-small"></i></button></div>
            <div id="detailDesc" class="w-full"></div>
            <button class="modal-btn w-full bg-[#5D4037] text-white py-4 rounded-2xl font-bold text-[20px] mt-6 cursor-pointer" onclick="closeDetailModal()">닫기</button>
        </div>
    </div>

    <div id="monthPickerModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]">
        <div class="modal-content bg-[#FFFDF5] p-6 rounded-2xl w-[350px] shadow-xl border-4 border-[#5D4037]">
            <div class="flex justify-between items-center mb-6 px-4">
                <button class="text-2xl text-[#5D4037] hover:scale-110 transition modal-arrow-btn cursor-pointer" onclick="changePickerYear(-1)"><i class="fi fi-rr-angle-left"></i></button>
                <div class="text-2xl font-bold text-[#5D4037]" id="pickerYearText"></div>
                <button class="text-2xl text-[#5D4037] hover:scale-110 transition modal-arrow-btn cursor-pointer" onclick="changePickerYear(1)"><i class="fi fi-rr-angle-right"></i></button>
            </div>
            <div class="grid grid-cols-4 gap-3 mb-6" id="pickerMonthGrid"></div>
            <button class="w-full bg-gray-200 text-[#5D4037] py-3 rounded-xl font-bold text-lg hover:bg-gray-300 transition cursor-pointer" onclick="closeMonthPicker()">취소</button>
        </div>
    </div>

    <div id="contextMenu" class="hidden fixed bg-white border-2 border-[#5D4037] rounded-lg shadow-xl z-[6000] w-32 flex-col overflow-hidden">
        <button class="context-menu-btn text-[#5D4037] border-b border-gray-100 hover:bg-gray-100" onclick="editFromMenu()">수정하기</button>
        <button class="context-menu-btn text-red-500 hover:bg-gray-100" onclick="deleteFromMenu()">삭제하기</button>
    </div>

    <div id="mobileDatePickerModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[5000]">
        <div class="modal-content bg-[#FFFDF5] p-6 rounded-2xl w-[350px] shadow-xl border-4 border-[#5D4037] flex flex-col">
            <div class="flex justify-between items-center mb-4 px-2">
                <button class="text-2xl text-[#5D4037] hover:scale-110 transition cursor-pointer" onclick="changeDatePickerMonth(-1)"><i class="fi fi-rr-angle-left"></i></button>
                <div class="text-xl font-bold text-[#5D4037] font-paperozi" id="datePickerTitle"></div>
                <button class="text-2xl text-[#5D4037] hover:scale-110 transition cursor-pointer" onclick="changeDatePickerMonth(1)"><i class="fi fi-rr-angle-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center font-bold text-gray-500 text-sm mb-2 font-paperozi">
                <div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-500">토</div><div class="text-red-500">일</div>
            </div>
            <div id="datePickerGrid" class="grid grid-cols-7 gap-1 text-center font-bold font-paperozi"></div>
            <button class="w-full mt-4 bg-gray-200 text-[#5D4037] py-3 rounded-xl font-bold text-lg hover:bg-gray-300 transition cursor-pointer" onclick="closeMobileDatePicker()">취소</button>
        </div>
    </div>

    <div id="upPopupOverlay" class="hidden fixed inset-0 bg-black/50 z-[9999] flex items-center justify-center p-4">
        <div class="bg-[#FFFDF5] w-full max-w-[400px] rounded-2xl shadow-2xl border-4 border-[#5D4037] overflow-hidden flex flex-col">
            <div class="p-6 border-b-[4px] border-[#5D4037] bg-white text-center">
                <h2 class="text-2xl font-bold text-[#5D4037] font-paperozi">UP 해줘!</h2>
            </div>
            <div id="upPopupList" class="p-4 max-h-[400px] overflow-y-auto modal-scroll"></div>
            <div class="flex justify-between items-center p-4 border-t-2 border-[#5D4037] bg-white">
                <label class="flex items-center gap-2 text-sm font-bold text-[#5D4037] cursor-pointer">
                    <input type="checkbox" id="noMorePopup" class="w-4 h-4 accent-[#5D4037]"> 오늘 하루 보지 않기
                </label>
                <button onclick="closeUpPopup()" class="px-6 py-2 bg-[#5D4037] text-white font-bold rounded-lg hover:brightness-110 transition">닫기</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
